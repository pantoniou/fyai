name: Release (mostly-static)

run-name: >-
  ${{ github.event_name == 'workflow_dispatch' && 'Release · manual' ||
      format('Release · {0}', github.ref_name) }}

on:
  push:
    branches: [ master ]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  # Pinned to the same libfyaml commit fyai's CMakeLists fetches, so the
  # statically-linked archive matches what a normal build would pull in.
  LIBFYAML_REPO: https://github.com/pantoniou/libfyaml
  LIBFYAML_REF: a6886c587ef2855f4f2e2c16a361743747f85f8d

jobs:
  build:
    name: mostly-static - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: fyai-linux-x86_64
          - os: macos-latest
            asset: fyai-macos-arm64

    steps:
    - name: "Checkout"
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: "Setup python"
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: "Install CMake/Ninja"
      uses: lukka/get-cmake@latest

    - name: "Install dependencies (Ubuntu)"
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update -qq
        sudo apt-get install --no-install-recommends -y \
          pkg-config libssl-dev zlib1g-dev python3 yq zstd

    - name: "Install dependencies (macOS)"
      if: runner.os == 'macOS'
      run: |
        brew update
        brew install pkg-config openssl zstd
        python -m pip install --upgrade yq

    - name: "Build & install static libfyaml"
      run: |
        git clone "${LIBFYAML_REPO}" /tmp/libfyaml
        git -C /tmp/libfyaml checkout "${LIBFYAML_REF}"
        cmake -S /tmp/libfyaml -B /tmp/libfyaml/build \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=OFF \
          -DBUILD_TESTING=OFF \
          -DCMAKE_INSTALL_PREFIX=/usr/local
        cmake --build /tmp/libfyaml/build
        sudo cmake --install /tmp/libfyaml/build

    - name: "Configure fyai (mostly-static)"
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DFYAI_MOSTLY_STATIC=ON \
          -DBUILD_TESTING=OFF

    - name: "Build"
      run: |
        cmake --build build

    - name: "Verify linkage"
      run: |
        if [ "${{ runner.os }}" = "Linux" ]; then
          ldd build/fyai
        else
          otool -L build/fyai
        fi
        build/fyai --help >/dev/null

    - name: "Package"
      run: |
        mkdir -p dist
        cp build/fyai "dist/${{ matrix.asset }}"
        tar -C dist -czf "${{ matrix.asset }}.tar.gz" "${{ matrix.asset }}"

    - name: "Upload artifact"
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset }}
        path: ${{ matrix.asset }}.tar.gz

    - name: "Determine release tag"
      id: rel
      run: |
        if [ "${{ startsWith(github.ref, 'refs/tags/v') }}" = "true" ]; then
          echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "prerelease=false" >> "$GITHUB_OUTPUT"
        else
          echo "tag=nightly" >> "$GITHUB_OUTPUT"
          echo "prerelease=true" >> "$GITHUB_OUTPUT"
        fi

    - name: "Publish release"
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.rel.outputs.tag }}
        name: ${{ steps.rel.outputs.tag == 'nightly' && 'Nightly build' || steps.rel.outputs.tag }}
        prerelease: ${{ steps.rel.outputs.prerelease }}
        make_latest: ${{ steps.rel.outputs.prerelease == 'false' }}
        target_commitish: ${{ github.sha }}
        body: ${{ steps.rel.outputs.tag == 'nightly' && format('Built from {0} @ {1}', github.ref_name, github.sha) || '' }}
        files: ${{ matrix.asset }}.tar.gz
