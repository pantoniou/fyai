# fyai "plain" markdown theme (libfymd4c schema).
#
# Minimal look: no user-turn bubble, no fenced-code syntax highlighting.
# Selected with display.markdown_theme: plain (or --markdown-theme plain).

elements:
  # neutral reverse - just dim, no filled card
  reverse:
    on:  "\e[2m"
    off: "\e[0m"
    light:
      on:  "\e[2m"
      off: "\e[0m"

code:
  enabled: false
