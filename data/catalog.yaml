    read:
      description: |
        Read a file or directory from the local filesystem. If the path does not exist, an error is returned.

        Usage:
        - The filePath parameter should be an absolute path.
        - By default, this tool returns up to 2000 lines from the start of the file.
        - The offset parameter is the line number to start from (1-indexed).
        - To read later sections, call this tool again with a larger offset.
        - Use the grep tool to find specific content in large files or files with long lines.
        - If you are unsure of the correct file path, use the glob tool to look up filenames by glob pattern.
        - Contents are returned with each line prefixed by its line number as `<line>: <content>`. For example, if a file has contents "foo\n", you will receive "1: foo\n". For directories, entries are returned one per line (without line numbers) with a trailing `/` for subdirectories.
        - Any line longer than 2000 characters is truncated.
        - Call this tool in parallel when you know there are multiple files you want to read.
        - Avoid tiny repeated slices (30 line chunks). If you need more context, read a larger window.
        - This tool can read image files and PDFs and return them as file attachments.
      schema:
        $schema: https://json-schema.org/draft/2020-12/schema
        type: object
        properties:
          filePath:
            description: The absolute path to the file or directory to read
            type: string
          offset:
            description: The line number to start reading from (1-indexed)
            type: integer
            minimum: 0
            maximum: 9007199254740991
          limit:
            description: The maximum number of lines to read (defaults to 2000)
            type: integer
            minimum: 0
            maximum: 9007199254740991
        required:
        - filePath
    glob:
      description: |
        - Fast file pattern matching tool that works with any codebase size
        - Supports glob patterns like "**/*.js" or "src/**/*.ts"
        - Returns matching file paths sorted by modification time
        - Use this tool when you need to find files by name patterns
        - When you are doing an open-ended search that may require multiple rounds of globbing and grepping, use the Task tool instead
        - You have the capability to call multiple tools in a single response. It is always better to speculatively perform multiple searches as a batch that are potentially useful.
      schema:
        $schema: https://json-schema.org/draft/2020-12/schema
        type: object
        properties:
          pattern:
            description: The glob pattern to match files against
            type: string
          path:
            description: 'The directory to search in. If not specified, the current working directory will be used. IMPORTANT: Omit this field to use the default directory. DO NOT enter "undefined" or "null" - simply omit it for the default behavior. Must be a valid directory path if provided.'
            type: string
        required:
        - pattern
    grep:
      description: |
        - Fast content search tool that works with any codebase size
        - Searches file contents using regular expressions
        - Supports full regex syntax (eg. "log.*Error", "function\s+\w+", etc.)
        - Filter files by pattern with the include parameter (eg. "*.js", "*.{ts,tsx}")
        - Returns file paths and line numbers with at least one match sorted by modification time
        - Use this tool when you need to find files containing specific patterns
        - If you need to identify/count the number of matches within files, use the Bash tool with `rg` (ripgrep) directly. Do NOT use `grep`.
        - When you are doing an open-ended search that may require multiple rounds of globbing and grepping, use the Task tool instead
      schema:
        $schema: https://json-schema.org/draft/2020-12/schema
        type: object
        properties:
          pattern:
            description: The regex pattern to search for in file contents
            type: string
          path:
            description: The directory to search in. Defaults to the current working directory.
            type: string
          include:
            description: File pattern to include in the search (e.g. "*.js", "*.{ts,tsx}")
            type: string
        required:
        - pattern
    edit:
      description: |
        Performs exact string replacements in files. 

        Usage:
        - You must use your `Read` tool at least once in the conversation before editing. This tool will error if you attempt an edit without reading the file. 
        - When editing text from Read tool output, ensure you preserve the exact indentation (tabs/spaces) as it appears AFTER the line number prefix. The line number prefix format is: line number + colon + space (e.g., `1: `). Everything after that space is the actual file content to match. Never include any part of the line number prefix in the oldString or newString.
        - ALWAYS prefer editing existing files in the codebase. NEVER write new files unless explicitly required.
        - Only use emojis if the user explicitly requests it. Avoid adding emojis to files unless asked.
        - The edit will FAIL if `oldString` is not found in the file with an error "oldString not found in content".
        - The edit will FAIL if `oldString` is found multiple times in the file with an error "Found multiple matches for oldString. Provide more surrounding lines in oldString to identify the correct match." Either provide a larger string with more surrounding context to make it unique or use `replaceAll` to change every instance of `oldString`. 
        - Use `replaceAll` for replacing and renaming strings across the file. This parameter is useful if you want to rename a variable for instance.
      schema:
        $schema: https://json-schema.org/draft/2020-12/schema
        type: object
        properties:
          filePath:
            description: The absolute path to the file to modify
            type: string
          oldString:
            description: The text to replace
            type: string
          newString:
            description: The text to replace it with (must be different from oldString)
            type: string
          replaceAll:
            description: Replace all occurrences of oldString (default false)
            type: boolean
        required:
        - filePath
        - oldString
        - newString
    write:
      description: |
        Writes a file to the local filesystem.

        Usage:
        - This tool will overwrite the existing file if there is one at the provided path.
        - If this is an existing file, you MUST use the Read tool first to read the file's contents. This tool will fail if you did not read the file first.
        - ALWAYS prefer editing existing files in the codebase. NEVER write new files unless explicitly required.
        - NEVER proactively create documentation files (*.md) or README files. Only create documentation files if explicitly requested by the User.
        - Only use emojis if the user explicitly requests it. Avoid writing emojis to files unless asked.
      schema:
        $schema: https://json-schema.org/draft/2020-12/schema
        type: object
        properties:
          content:
            description: The content to write to the file
            type: string
          filePath:
            description: The absolute path to the file to write (must be absolute, not relative)
            type: string
        required:
        - content
        - filePath
    task:
      description: |-
        Launch a new agent to handle complex, multistep tasks autonomously.

        When using the Task tool, you must specify a subagent_type parameter to select which agent type to use.

        When to use the Task tool:
        - When you are instructed to execute custom slash commands. Use the Task tool with the slash command invocation as the entire prompt. The slash command can take arguments. For example: Task(description="Check the file", prompt="/check-file path/to/file.py")

        When NOT to use the Task tool:
        - If you want to read a specific file path, use the Read or Glob tool instead of the Task tool, to find the match more quickly
        - If you are searching for a specific class definition like "class Foo", use the Glob tool instead, to find the match more quickly
        - If you are searching for code within a specific file or set of 2-3 files, use the Read tool instead of the Task tool, to find the match more quickly
        - Other tasks that are not related to the agent descriptions above


        Usage notes:
        1. Launch multiple agents concurrently whenever possible, to maximize performance; to do that, use a single message with multiple tool uses
        2. When the agent is done, it will return a single message back to you. The result returned by the agent is not visible to the user. To show the user the result, you should send a text message back to the user with a concise summary of the result. The output includes a task_id you can reuse later to continue the same subagent session.
        3. Each agent invocation starts with a fresh context unless you provide task_id to resume the same subagent session (which continues with its previous messages and tool outputs). When starting fresh, your prompt should contain a highly detailed task description for the agent to perform autonomously and you should specify exactly what information the agent should return back to you in its final and only message to you.
        4. The agent's outputs should generally be trusted
        5. Clearly tell the agent whether you expect it to write code or just to do research (search, file reads, web fetches, etc.), since it is not aware of the user's intent. Tell it how to verify its work if possible (e.g., relevant test commands).
        6. If the agent description mentions that it should be used proactively, then you should try your best to use it without the user having to ask for it first. Use your judgement.

        Example usage (NOTE: The agents below are fictional examples for illustration only - use the actual agents listed above):

        <example_agent_descriptions>
        "code-reviewer": use this agent after you are done writing a significant piece of code
        "greeting-responder": use this agent when to respond to user greetings with a friendly joke
        </example_agent_description>

        <example>
        user: "Please write a function that checks if a number is prime"
        assistant: Sure let me write a function that checks if a number is prime
        assistant: First let me use the Write tool to write a function that checks if a number is prime
        assistant: I'm going to use the Write tool to write the following code:
        <code>
        function isPrime(n) {
          if (n <= 1) return false
          for (let i = 2; i * i <= n; i++) {
            if (n % i === 0) return false
          }
          return true
        }
        </code>
        <commentary>
        Since a significant piece of code was written and the task was completed, now use the code-reviewer agent to review the code
        </commentary>
        assistant: Now let me use the code-reviewer agent to review the code
        assistant: Uses the Task tool to launch the code-reviewer agent
        </example>

        <example>
        user: "Hello"
        <commentary>
        Since the user is greeting, use the greeting-responder agent to respond with a friendly joke
        </commentary>
        assistant: "I'm going to use the Task tool to launch the with the greeting-responder agent"
        </example>

        Available agent types and the tools they have access to:
        - explore: Fast agent specialized for exploring codebases. Use this when you need to quickly find files by patterns (eg. "src/components/**/*.tsx"), search code for keywords (eg. "API endpoints"), or answer questions about the codebase (eg. "how do API endpoints work?"). When calling this agent, specify the desired thoroughness level: "quick" for basic searches, "medium" for moderate exploration, or "very thorough" for comprehensive analysis across multiple locations and naming conventions.
        - general: General-purpose agent for researching complex questions and executing multi-step tasks. Use this agent to execute multiple units of work in parallel.
      schema:
        $schema: https://json-schema.org/draft/2020-12/schema
        type: object
        properties:
          description:
            description: A short (3-5 words) description of the task
            type: string
          prompt:
            description: The task for the agent to perform
            type: string
          subagent_type:
            description: The type of specialized agent to use for this task
            type: string
          task_id:
            description: This should only be set if you mean to resume a previous task (you can pass a prior task_id and the task will continue the same subagent session as before instead of creating a fresh one)
            type: string
          command:
            description: The command that triggered this task
            type: string
        required:
        - description
        - prompt
        - subagent_type
    webfetch:
