# fyai configuration document schema (JSON Schema 2020-12 subset; see
# src/fyai_schema.c for the supported keyword set: type, const, enum,
# min/maxLength, pattern, format, min/maximum, exclusive{Min,Max}imum,
# properties, required, propertyNames, additionalProperties, items,
# min/maxItems, anyOf/allOf/oneOf/not - no $ref, no patternProperties).
#
# Deliberately permissive at every level (additionalProperties left unset,
# i.e. true): this validates the shape/type/enum of keys fyai actually reads
# (config.yaml.sample is the authoritative list of those, with their
# defaults), not a closed vocabulary - an unknown key is silently ignored by
# the loader today, so rejecting it here would just be a second, divergent
# source of truth. Nothing in this file is wired into the config commit path
# yet; it is meant for validation callers (`fyai config validate`, editors,
# CI) to point at explicitly.
type: object
properties:
  model:
    type: string
  api:
    type: string
    enum: [responses, chat-completions, chat, messages]
  api_url:
    type: string
  api_key:
    type: object
    required: [type, value]
    properties:
      type:
        type: string
        const: env
      value:
        type: string
  system_prompt:
    type: string
  temperature:
    type: number
    minimum: 0
    maximum: 2
  max_tool_iterations:
    type: integer
    exclusiveMinimum: 0
  max_tokens:
    type: integer
    exclusiveMinimum: 0
  reasoning:
    type: object
    properties:
      effort:
        type: string
        enum: [minimal, low, medium, high]
      summary:
        type: string
        enum: [auto, concise, detailed]
  tools:
    type: boolean
  builtin_shell:
    type: boolean
  sandbox:
    oneOf:
      - type: boolean
      - type: object
        properties:
          enabled:
            type: boolean
          deny:
            type: array
            items:
              type: string
          allow:
            type: array
            items:
              anyOf:
                - type: string
                - type: object
                  required: [path]
                  properties:
                    path:
                      type: string
                    mode:
                      type: string
                      enum: [rw, ro, edit, append]
          network:
            type: object
            properties:
              ports:
                type: array
                items:
                  type: integer
                  minimum: 1
                  maximum: 65535
  logprobs:
    type: boolean
  top_logprobs:
    type: integer
    minimum: -1
  token_extents:
    type: boolean
  no_obfuscation:
    type: boolean
  whitewash_api_keys:
    type: boolean
  response_chain:
    type: boolean
  arena_dir:
    type: string
  logging:
    type: object
    properties:
      wire:
        type: boolean
      stream:
        type: boolean
      conversation:
        type: boolean
  display:
    type: object
    properties:
      markdown:
        type: boolean
      stream:
        type: boolean
      tool_preview_lines:
        type: integer
        minimum: 0
      markdown_mode:
        type: string
        enum: [line, stream, oneshot]
      color:
        type: string
        enum: [auto, off, on]
      theme:
        type: string
        enum: [auto, dark, light]
      markdown_theme:
        type: string
      code_theme:
        type: string
      markdown_style:
        type: string
      pretty:
        type: boolean
      cache_info:
        type: boolean
      stats:
        type: boolean
  # Read-only, re-derived from the catalogue on every commit
  # (catalog_sync_config_doc in src/fyai_config.c) - never hand-edit.
  catalog:
    type: object
    required: [name]
    properties:
      name:
        type: string
      display_name:
        type: string
      context_window:
        type: integer
      max_output_tokens:
        type: integer
      modalities:
        type: array
        items:
          type: string
      capabilities:
        type: array
        items:
          type: string
      open_source:
        type: boolean
      native_provider:
        type: string
      canonical_provider:
        type: string
      arena:
        type: object
        properties:
          rank:
            type: integer
          elo:
            type: number
          votes:
            type: integer
